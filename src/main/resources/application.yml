info:
    serviceLinks:
        api-doc: "${route.name}/docs/index.html"
    dependencies:
        skatteetaten: "skatteetaten"

spring:
    profiles:
        active: local

logging:
    level:
        ske.aurora: TRACE
        no.skatteetaten: TRACE
        org:
            springframework: WARN
            springframework.jdbc: TRACE
            springframework.http: TRACE
            apache.catalina: WARN
            hibernate: WARN

aurora.starter.requestbasedlogging:
    enabled: true
    wait: 30
---
spring:
  profiles: local
  datasource:
    url: ${refapp.datasource.url:jdbc:oracle:thin:@host:port/path}
    username: ${refapp.datasource.username:username}
    password: ${refapp.datasource.password:password}


management:
    server.port: 8081


logging:
    pattern:
        console: "%d [%-9.9thread] %-5level %logger %X - %msg %n%rEx{full}"
    config: local-logback.xml

